<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(59,130,246,0.08)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0e1a"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Horizon glow -->
  <rect width="1200" height="300" y="330" fill="url(#horizon)" opacity="0.5"/>
  <linearGradient id="horizon" x1="0" y1="1" x2="0" y2="0">
    <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
  </linearGradient>

  <!-- Game area representation -->
  <rect x="400" y="115" width="400" height="400" rx="8" fill="#080c15" stroke="rgba(59,130,246,0.3)" stroke-width="2"/>

  <!-- Grid inside game area -->
  <g opacity="0.06">
    <line x1="430" y1="115" x2="430" y2="515" stroke="#3b82f6"/>
    <line x1="460" y1="115" x2="460" y2="515" stroke="#3b82f6"/>
    <line x1="490" y1="115" x2="490" y2="515" stroke="#3b82f6"/>
    <line x1="520" y1="115" x2="520" y2="515" stroke="#3b82f6"/>
    <line x1="550" y1="115" x2="550" y2="515" stroke="#3b82f6"/>
    <line x1="580" y1="115" x2="580" y2="515" stroke="#3b82f6"/>
    <line x1="610" y1="115" x2="610" y2="515" stroke="#3b82f6"/>
    <line x1="640" y1="115" x2="640" y2="515" stroke="#3b82f6"/>
    <line x1="670" y1="115" x2="670" y2="515" stroke="#3b82f6"/>
    <line x1="700" y1="115" x2="700" y2="515" stroke="#3b82f6"/>
    <line x1="730" y1="115" x2="730" y2="515" stroke="#3b82f6"/>
    <line x1="760" y1="115" x2="760" y2="515" stroke="#3b82f6"/>
    <line x1="400" y1="145" x2="800" y2="145" stroke="#3b82f6"/>
    <line x1="400" y1="175" x2="800" y2="175" stroke="#3b82f6"/>
    <line x1="400" y1="205" x2="800" y2="205" stroke="#3b82f6"/>
    <line x1="400" y1="235" x2="800" y2="235" stroke="#3b82f6"/>
    <line x1="400" y1="265" x2="800" y2="265" stroke="#3b82f6"/>
    <line x1="400" y1="295" x2="800" y2="295" stroke="#3b82f6"/>
    <line x1="400" y1="325" x2="800" y2="325" stroke="#3b82f6"/>
    <line x1="400" y1="355" x2="800" y2="355" stroke="#3b82f6"/>
    <line x1="400" y1="385" x2="800" y2="385" stroke="#3b82f6"/>
    <line x1="400" y1="415" x2="800" y2="415" stroke="#3b82f6"/>
    <line x1="400" y1="445" x2="800" y2="445" stroke="#3b82f6"/>
    <line x1="400" y1="475" x2="800" y2="475" stroke="#3b82f6"/>
    <line x1="400" y1="505" x2="800" y2="505" stroke="#3b82f6"/>
  </g>

  <!-- Blue player square -->
  <rect x="560" y="420" width="30" height="30" rx="2" fill="#3b82f6" filter="url(#glow)"/>
  <!-- Player trail -->
  <rect x="560" y="435" width="30" height="30" rx="2" fill="#3b82f6" opacity="0.08"/>
  <rect x="560" y="450" width="30" height="30" rx="2" fill="#3b82f6" opacity="0.04"/>

  <!-- Red enemy squares -->
  <rect x="470" y="200" width="26" height="26" rx="2" fill="#ef4444" filter="url(#glow)"/>
  <rect x="680" y="340" width="26" height="26" rx="2" fill="#ef4444" filter="url(#glow)"/>
  <rect x="550" y="160" width="26" height="26" rx="2" fill="#ef4444" filter="url(#glow)"/>

  <!-- Diamond -->
  <g transform="translate(640, 280) rotate(45)">
    <rect x="-8" y="-8" width="16" height="16" fill="#eab308" filter="url(#glow)"/>
  </g>

  <!-- Title -->
  <text x="600" y="580" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="900" fill="#fff" letter-spacing="8" filter="url(#glow-strong)">BLOCK</text>

  <!-- Subtitle -->
  <text x="600" y="610" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="rgba(59,130,246,0.6)" letter-spacing="3">DODGE THE CHAOS</text>
</svg>
