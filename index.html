  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0e1a;
      background-image:
        linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 24px 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      position: relative;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 40%;
      background: linear-gradient(to top, rgba(59,130,246,0.06), transparent);
      pointer-events: none;
    }
    #game-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      position: relative;
      z-index: 1;
    }
    #score-display {
      font-size: 22px;
      font-weight: 800;
      color: rgba(59,130,246,0.5);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    #score-display span {
      color: #3b82f6;
      text-shadow: 0 0 20px rgba(59,130,246,0.5);
    }
    #canvas-wrapper {
      position: relative;
      display: inline-block;
    }
    canvas#game-canvas {
      display: block;
      border: 2px solid rgba(59,130,246,0.25);
      border-radius: 8px;
      background: #080c15;
      box-shadow: 0 0 20px rgba(59,130,246,0.08), 0 4px 24px rgba(0,0,0,0.3);
      max-width: calc(100vw - 24px);
      max-height: calc(100vw - 24px);
    }
    .edge-glow {
      position: absolute;
      pointer-events: none;
      border-radius: 8px;
      opacity: 0;
    }
    .edge-glow.top, .edge-glow.bottom { left: 0; right: 0; height: 6px; }
    .edge-glow.left, .edge-glow.right { top: 0; bottom: 0; width: 6px; }
    .edge-glow.top { top: -1px; }
    .edge-glow.bottom { bottom: -1px; }
    .edge-glow.left { left: -1px; }
    .edge-glow.right { right: -1px; }
    #zoom-lens {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 2px solid rgba(59,130,246,0.4);
      box-shadow: 0 0 12px rgba(59,130,246,0.2);
      z-index: 50;
      overflow: hidden;
      pointer-events: none;
    }
    #zoom-lens.visible { display: block; }
    #instructions {
      font-size: 13px;
      color: rgba(59,130,246,0.35);
      text-align: center;
      letter-spacing: 1px;
    }

    /* Shared panel scan-line overlay */
    .panel-scanlines {
      position: relative;
      overflow: hidden;
    }
    .panel-scanlines::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(59,130,246,0.03) 2px, rgba(59,130,246,0.03) 4px);
      pointer-events: none;
      z-index: 1;
    }

    /* Toggle switches */
    #lens-toggle {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 6px;
      font-size: 13px;
      color: rgba(59,130,246,0.35);
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #lens-toggle .switch {
      position: relative;
      width: 40px;
      height: 24px;
      background: rgba(59,130,246,0.15);
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: 12px;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
      flex-shrink: 0;
    }
    #lens-toggle .switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      background: rgba(59,130,246,0.4);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    #lens-toggle.on .switch, #sound-toggle.on .switch {
      background: rgba(59,130,246,0.25);
      border-color: rgba(59,130,246,0.5);
      box-shadow: 0 0 8px rgba(59,130,246,0.3);
    }
    #lens-toggle.on .switch::after, #sound-toggle.on .switch::after {
      transform: translateX(16px);
      background: #3b82f6;
      box-shadow: 0 0 6px rgba(59,130,246,0.5);
    }
    #sound-toggle .switch {
      position: relative;
      width: 40px;
      height: 24px;
      background: rgba(59,130,246,0.15);
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: 12px;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
      flex-shrink: 0;
    }
    #sound-toggle .switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      background: rgba(59,130,246,0.4);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    /* In-board panels — sit on top of the canvas inside canvas-wrapper */
    .board-panel {
      display: none;
      position: absolute;
      inset: 0;

    }
    .board-panel p {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 5px;
      line-height: 1.5;
    }
    .board-panel p b { color: rgba(255,255,255,0.8); }
    .board-panel .hint {
      font-size: 11px;
      color: rgba(59,130,246,0.35);
      margin-top: 12px;
      letter-spacing: 1px;
    }
    .board-panel button {
      background: rgba(59,130,246,0.2);
      color: #3b82f6;
      border: 1px solid rgba(59,130,246,0.4);
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.15s;
      box-shadow: 0 0 12px rgba(59,130,246,0.15);

      margin-top: 14px;
    }
    .board-panel button:hover {
      background: rgba(59,130,246,0.3);
      box-shadow: 0 0 20px rgba(59,130,246,0.3);
    }

    /* Leaderboard inside panel */
    #leaderboard {
      text-align: left;
      margin-bottom: 12px;
      width: 100%;
      max-width: 280px;
    }
    #leaderboard .lb-title {
      font-size: 10px;
      color: rgba(59,130,246,0.4);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(59,130,246,0.1);
    }
    .lb-entry {
      display: flex;
      align-items: center;
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      padding: 6px 8px;
      margin-bottom: 2px;
      border-radius: 4px;

    .lb-entry:nth-child(1) { background: rgba(59,130,246,0.08); }
    .lb-entry:nth-child(2) { background: rgba(59,130,246,0.04); }
    .lb-entry:nth-child(3) { background: rgba(59,130,246,0.02); }
    .lb-entry.you {
      color: #3b82f6;
      font-weight: 700;
      background: rgba(59,130,246,0.12);
      text-shadow: 0 0 8px rgba(59,130,246,0.3);
      border-left: 2px solid #3b82f6;
    }
    .lb-entry .lb-rank {
      width: 28px;
      flex-shrink: 0;
      font-size: 11px;
      color: rgba(59,130,246,0.4);
      font-weight: 700;
    }
    .lb-entry.you .lb-rank { color: #3b82f6; }
    .lb-entry .lb-name { flex: 1; }
    .lb-entry .lb-score {
      font-weight: 700;
      min-width: 30px;
      text-align: right;
      font-size: 14px;
      letter-spacing: 1px;
    }

    /* Name input */
    #name-form { text-align: left; width: 100%; max-width: 240px; }
    #name-input {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid rgba(59,130,246,0.2);
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      margin-bottom: 10px;
      background: rgba(0,0,0,0.4);
      color: #fff;
    }
    #name-input:focus {
      border-color: rgba(59,130,246,0.5);
      box-shadow: 0 0 10px rgba(59,130,246,0.2);
    }
    #name-input::placeholder { color: rgba(59,130,246,0.3); }
  </style>

<body>

  <!-- Zoom Lens (off-canvas) -->
  <canvas id="zoom-lens" width="110" height="110"></canvas>

  <!-- Game -->
  <div id="game-wrapper">
    <div id="score-display">Score: <span id="score">0</span></div>
    <div id="canvas-wrapper">
      <canvas id="game-canvas"></canvas>
      <div class="edge-glow top" id="glow-top"></div>

      <!-- Panels live inside the canvas wrapper, overlaying the game board -->
      <div id="start-panel" class="board-panel panel-scanlines visible">

            <div style="font-size:11px;color:rgba(234,179,8,0.8);letter-spacing:1px;font-weight:600">COLLECT</div>

      <div id="name-panel" class="board-panel panel-scanlines">
        <h2>GAME OVER</h2>
        <div class="your-score">You scored <b id="name-score">0</b> points!</div>

        <div id="name-form">
          <label for="name-input" style="font-size:13px;color:rgba(255,255,255,0.4);display:block;margin-bottom:6px">Enter your name for the leaderboard:</label>
          <input type="text" id="name-input" maxlength="12" placeholder="Your name..." />
          <button id="name-submit-btn">Submit</button>
        </div>
      </div>

      <div id="game-over-panel" class="board-panel panel-scanlines">
        <h2>LEADERBOARD</h2>
        <div class="your-score"><b id="final-name">You</b> scored <b id="final-score">0</b> points!</div>
        <div id="leaderboard">
          <div class="lb-title">Top Scores</div>
          <div id="lb-entries"></div>
        </div>
        <button id="play-again-btn">Play Again</button>
      </div>
    </div>
    <div id="instructions">Arrow keys or touch to move</div>
    <div style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap;">
      <div id="lens-toggle" class="on">
        <span class="switch"></span>
        <span>Touch preview</span>
      </div>
      <div id="sound-toggle" class="on" style="display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(59,130,246,0.35);cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;">
        <span class="switch"></span>
        <span>Sound</span>
      </div>

  <script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    // ==================== AUDIO ENGINE ====================
    let audioCtx = null;
    let soundEnabled = localStorage.getItem('block_sound') !== 'off';
    let musicGain = null;
    let sfxGain = null;
    let musicPlaying = false;

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      musicGain = audioCtx.createGain();
      musicGain.gain.value = 0.5;
      musicGain.connect(audioCtx.destination);
      sfxGain = audioCtx.createGain();
      sfxGain.gain.value = 0.4;
      sfxGain.connect(audioCtx.destination);
      updateAudioMute();
    }

    function updateAudioMute() {
      if (!audioCtx) return;
      const vol = soundEnabled ? 1 : 0;
      musicGain.gain.setTargetAtTime(soundEnabled ? 0.5 : 0, audioCtx.currentTime, 0.05);
      sfxGain.gain.setTargetAtTime(soundEnabled ? 0.4 : 0, audioCtx.currentTime, 0.05);
    }

    // --- Synth helpers ---
    function playTone(freq, type, duration, dest, detune) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const env = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      if (detune) osc.detune.value = detune;
      env.gain.setValueAtTime(0.3, audioCtx.currentTime);
      env.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.connect(env);
      env.connect(dest || sfxGain);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function playNoise(duration, dest) {
      if (!audioCtx) return;
      const bufSize = audioCtx.sampleRate * duration;
      const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const env = audioCtx.createGain();
      env.gain.setValueAtTime(0.15, audioCtx.currentTime);
      env.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'highpass';
      filter.frequency.value = 2000;
      src.connect(filter);
      filter.connect(env);
      env.connect(dest || sfxGain);
      src.start();
      src.stop(audioCtx.currentTime + duration);
    }

    // --- Sound effects ---
    function sfxLaunch() {
      playTone(220, 'sawtooth', 0.3, sfxGain);
      playTone(440, 'square', 0.15, sfxGain);
      playNoise(0.1);
    }

    function sfxDiamond() {
      playTone(880, 'sine', 0.12, sfxGain);
      playTone(1320, 'sine', 0.15, sfxGain);
      setTimeout(() => playTone(1760, 'sine', 0.1, sfxGain), 60);
    }

    function sfxWallBounce(intensity) {
      if (!audioCtx) return;
      const freq = 80 + intensity * 30;
      playTone(freq, 'square', 0.08, sfxGain);
      playNoise(0.05);
    }

    function sfxNewEnemy() {
      playTone(150, 'sawtooth', 0.4, sfxGain);
      playTone(100, 'square', 0.5, sfxGain, -10);
      playNoise(0.15);
    }

    function sfxDeath() {
      if (!audioCtx) return;
      // Deep rumble + descending sweep + noise burst
      playTone(80, 'sawtooth', 1.0, sfxGain);
      playTone(60, 'square', 1.2, sfxGain, 5);
      playNoise(0.6);
      const osc = audioCtx.createOscillator();
      const env = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(400, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.8);
      env.gain.setValueAtTime(0.25, audioCtx.currentTime);
      env.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.0);
      osc.connect(env);
      env.connect(sfxGain);
      osc.start();
      osc.stop(audioCtx.currentTime + 1.0);
    }

    function sfxVictory() {
      if (!audioCtx) return;
      // Bright ascending arpeggio
      const notes = [523, 659, 784, 1047];
      notes.forEach((f, i) => {
        setTimeout(() => {
          playTone(f, 'sine', 0.3, sfxGain);
          playTone(f * 1.5, 'sine', 0.2, sfxGain);
        }, i * 120);
      });
    }

    function sfxDefeat() {
      if (!audioCtx) return;
      // Soft descending tones
      const notes = [330, 277, 220];
      notes.forEach((f, i) => {
        setTimeout(() => playTone(f, 'sine', 0.35, sfxGain), i * 180);
      });
    }

    // --- Music: layers build with each new block, BPM escalates ---
    // Block 1 (launch):  kick + sub bass
    // Block 2 (5 pts):   + hi-hats
    // Block 3 (10 pts):  + square bass
    // Block 4 (15 pts):  + pad opens
    // Block 5 (20 pts):  + clap on 2&4
    // Block 6 (25 pts):  + acid line
    // Block 7 (30 pts):  + ride cymbal
    // Block 8 (35 pts):  + distorted lead
    // Block 9 (40 pts):  + noise riser
    // Block 10 (45 pts): + everything maxed
    // BPM: 126 → +6 per level
    let musicNodes = [];
    let lastSongIndex = -1;
    let musicLevel = 1; // 1-10, increases with each new block
    let currentBPM = 126;
    function getBeat() { return 60000 / currentBPM; }
    function getEighth() { return getBeat() / 2; }
    function getSixteenth() { return getBeat() / 4; }

    function musicLevelUp() {
      if (musicLevel < 10) {
        musicLevel++;
        currentBPM += 6;
      }
    }

    const songs = [
      { bass: [55, 55, 73.4, 55, 82.4, 55, 73.4, 65.4], pad: [110, 164.8, 220, 329.6],
        acid: [220, 0, 262, 220, 0, 330, 0, 262, 220, 0, 196, 0, 220, 262, 0, 220],
        lead: [330, 0, 294, 262, 0, 294, 330, 0, 392, 349, 0, 330, 0, 294, 262, 0] },
      { bass: [82.4, 82.4, 110, 82.4, 73.4, 82.4, 98, 82.4], pad: [164.8, 220, 329.6, 440],
        acid: [330, 0, 392, 0, 440, 330, 0, 392, 330, 0, 294, 330, 0, 392, 440, 0],
        lead: [440, 0, 392, 440, 0, 523, 0, 440, 392, 0, 349, 392, 0, 440, 0, 523] },
      { bass: [55, 73.4, 55, 55, 82.4, 73.4, 55, 65.4], pad: [110, 146.8, 220, 293.7],
        acid: [220, 262, 0, 294, 0, 220, 262, 0, 330, 0, 294, 262, 0, 220, 0, 262],
        lead: [294, 0, 262, 0, 220, 262, 294, 0, 330, 0, 294, 0, 262, 220, 0, 262] },
      { bass: [73.4, 73.4, 55, 82.4, 73.4, 55, 98, 73.4], pad: [146.8, 196, 293.7, 392],
        acid: [294, 0, 330, 294, 0, 392, 0, 330, 0, 294, 262, 0, 294, 330, 0, 294],
        lead: [392, 0, 349, 0, 330, 349, 392, 0, 440, 0, 392, 349, 0, 330, 0, 349] },
      { bass: [55, 55, 55, 73.4, 82.4, 82.4, 65.4, 55], pad: [110, 165, 196, 330],
        acid: [196, 0, 220, 0, 262, 196, 0, 220, 262, 0, 330, 262, 0, 220, 196, 0],
        lead: [262, 0, 330, 262, 0, 220, 262, 0, 330, 392, 0, 330, 0, 262, 220, 0] },
    ];

    function pickSong() {
      let idx;
      do { idx = Math.floor(Math.random() * songs.length); } while (idx === lastSongIndex);
      lastSongIndex = idx;
      return songs[idx];
    }

    function startMusic() {
      if (!audioCtx || musicPlaying) return;
      musicPlaying = true;
      const s = pickSong();
      musicLevel = 1;
      currentBPM = 126;
      const L = () => musicLevel; // shorthand

      // === Layer 1: Kick (always on) ===
      function tickKick() {
        if (!musicPlaying) return;
        const o = audioCtx.createOscillator(); const e = audioCtx.createGain();
        o.type = 'sine';
        o.frequency.setValueAtTime(160, audioCtx.currentTime);
        o.frequency.exponentialRampToValueAtTime(28, audioCtx.currentTime + 0.1);
        e.gain.setValueAtTime(0.4, audioCtx.currentTime);
        e.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
        o.connect(e); e.connect(musicGain);
        o.start(); o.stop(audioCtx.currentTime + 0.2);
        musicNodes.push(setTimeout(tickKick, getBeat()));
      }

      // === Layer 1: Sub bass (always on) ===
      let bStep = 0;
      function tickSub() {
        if (!musicPlaying) return;
        const freq = s.bass[bStep % s.bass.length];
        if (freq > 0) {
          const o = audioCtx.createOscillator(); const e = audioCtx.createGain();
          o.type = 'sine'; o.frequency.value = freq;
          e.gain.setValueAtTime(0.3, audioCtx.currentTime);
          e.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
          o.connect(e); e.connect(musicGain);
          o.start(); o.stop(audioCtx.currentTime + 0.27);
        }
        bStep++;
        musicNodes.push(setTimeout(tickSub, getBeat()));
      }

      // === Layer 2: Hi-hats (level >= 2) ===
      let hStep = 0;
      function tickHat() {
        if (!musicPlaying) return;
        if (L() >= 2) {
          const accent = hStep % 4 === 0 ? 0.12 : 0.05;
          const len = 0.04;
          const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * len, audioCtx.sampleRate);
          const d = buf.getChannelData(0);
          for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
          const src = audioCtx.createBufferSource(); src.buffer = buf;
          const e = audioCtx.createGain();
          e.gain.setValueAtTime(accent, audioCtx.currentTime);
          e.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + len);
          const hp = audioCtx.createBiquadFilter();
          hp.type = 'highpass'; hp.frequency.value = 8000;
          src.connect(hp); hp.connect(e); e.connect(musicGain);
          src.start(); src.stop(audioCtx.currentTime + len + 0.01);
        }
        hStep++;
        musicNodes.push(setTimeout(tickHat, getEighth()));
      }

      // === Layer 3: Square bass (level >= 3) ===
      let sqStep = 0;
      const bassFilter = audioCtx.createBiquadFilter();
      bassFilter.type = 'lowpass'; bassFilter.frequency.value = 500; bassFilter.Q.value = 4;
      bassFilter.connect(musicGain);
      function tickSquareBass() {
        if (!musicPlaying) return;
        if (L() >= 3) {
          const freq = s.bass[sqStep % s.bass.length];
          if (freq > 0) {
            const o = audioCtx.createOscillator(); const e = audioCtx.createGain();
            o.type = 'square'; o.frequency.value = freq;
            bassFilter.frequency.setTargetAtTime(500 + L() * 50, audioCtx.currentTime, 0.2);
            e.gain.setValueAtTime(0.2, audioCtx.currentTime);
            e.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
            o.connect(e); e.connect(bassFilter);
            o.start(); o.stop(audioCtx.currentTime + 0.2);
          }
          sqStep++;
        }
        musicNodes.push(setTimeout(tickSquareBass, getBeat()));
      }

      // === Layer 4: Pad (level >= 4) ===
      const padFilter = audioCtx.createBiquadFilter();
      padFilter.type = 'lowpass'; padFilter.frequency.value = 200; padFilter.Q.value = 2;
      padFilter.connect(musicGain);
      s.pad.forEach(f => {
        const o = audioCtx.createOscillator();
        o.type = 'sawtooth'; o.frequency.value = f;
        o.detune.value = Math.random() * 10 - 5;
        const g = audioCtx.createGain(); g.gain.value = 0.06;
        o.connect(g); g.connect(padFilter); o.start();
        musicNodes.push({ stop: () => {
          g.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
          o.stop(audioCtx.currentTime + 0.3);
        }});
      });
      // Pad filter controlled by tick
      function updatePad() {
        if (!musicPlaying) return;
        padFilter.frequency.setTargetAtTime(L() >= 4 ? 400 + L() * 80 : 200, audioCtx.currentTime, 0.3);
        musicNodes.push(setTimeout(updatePad, getBeat() * 4));
      }

      // === Layer 5: Clap on 2 & 4 (level >= 5) ===
      let clapBeat = 0;
      function tickClap() {
        if (!musicPlaying) return;
        if (L() >= 5 && clapBeat % 2 === 1) {
          const len = 0.06;
          const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * len, audioCtx.sampleRate);
          const d = buf.getChannelData(0);
          for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
          const src = audioCtx.createBufferSource(); src.buffer = buf;
          const e = audioCtx.createGain();
          e.gain.setValueAtTime(0.15, audioCtx.currentTime);
          e.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + len);
          const bp = audioCtx.createBiquadFilter();
          bp.type = 'bandpass'; bp.frequency.value = 2500; bp.Q.value = 1.5;
          src.connect(bp); bp.connect(e); e.connect(musicGain);
          src.start(); src.stop(audioCtx.currentTime + len + 0.01);
        }
        clapBeat++;
        musicNodes.push(setTimeout(tickClap, getBeat()));
      }

      // === Layer 6: Acid line (level >= 6) ===
      let acidStep = 0;
      function tickAcid() {
        if (!musicPlaying) return;
        if (L() >= 6) {
          const freq = s.acid[acidStep % s.acid.length];
          if (freq > 0) {
            const o = audioCtx.createOscillator(); const e = audioCtx.createGain();
            const f = audioCtx.createBiquadFilter();
            o.type = 'sawtooth'; o.frequency.value = freq;
            f.type = 'lowpass'; f.Q.value = 12;
            f.frequency.setValueAtTime(1800 + Math.random() * 1200, audioCtx.currentTime);
            f.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.12);
            e.gain.setValueAtTime(0.12, audioCtx.currentTime);
            e.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.13);
            o.connect(f); f.connect(e); e.connect(musicGain);
            o.start(); o.stop(audioCtx.currentTime + 0.15);
          }
          acidStep++;
        }
        musicNodes.push(setTimeout(tickAcid, getEighth()));
      }

      // === Layer 7: Ride cymbal (level >= 7) ===
      let rideStep = 0;
      function tickRide() {
        if (!musicPlaying) return;
        if (L() >= 7 && rideStep % 2 === 0) {
          const len = 0.08;
          const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * len, audioCtx.sampleRate);
          const d = buf.getChannelData(0);
          for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
          const src = audioCtx.createBufferSource(); src.buffer = buf;
          const e = audioCtx.createGain();
          e.gain.setValueAtTime(0.06, audioCtx.currentTime);
          e.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.07);
          const bp = audioCtx.createBiquadFilter();
          bp.type = 'bandpass'; bp.frequency.value = 6000; bp.Q.value = 3;
          src.connect(bp); bp.connect(e); e.connect(musicGain);
          src.start(); src.stop(audioCtx.currentTime + len + 0.01);
        }
        rideStep++;
        musicNodes.push(setTimeout(tickRide, getEighth()));
      }

      // === Layer 8: Distorted lead (level >= 8) ===
      let leadStep = 0;
      function tickLead() {
        if (!musicPlaying) return;
        if (L() >= 8) {
          const freq = s.lead[leadStep % s.lead.length];
          if (freq > 0) {
            const o = audioCtx.createOscillator(); const e = audioCtx.createGain();
            const f = audioCtx.createBiquadFilter();
            // Detuned saw pair for thickness
            o.type = 'sawtooth'; o.frequency.value = freq;
            const o2 = audioCtx.createOscillator();
            o2.type = 'sawtooth'; o2.frequency.value = freq; o2.detune.value = 15;
            f.type = 'lowpass'; f.frequency.value = 1200 + L() * 100; f.Q.value = 3;
            e.gain.setValueAtTime(0.1, audioCtx.currentTime);
            e.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            o.connect(f); o2.connect(f); f.connect(e); e.connect(musicGain);
            o.start(); o2.start();
            o.stop(audioCtx.currentTime + 0.22); o2.stop(audioCtx.currentTime + 0.22);
          }
          leadStep++;
        }
        musicNodes.push(setTimeout(tickLead, getBeat()));
      }

      // === Layer 9: Noise riser (level >= 9) — continuous rising filtered noise ===
      function startRiser() {
        const bufLen = 4;
        const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * bufLen, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
        const src = audioCtx.createBufferSource(); src.buffer = buf; src.loop = true;
        const e = audioCtx.createGain(); e.gain.value = 0.04;
        const f = audioCtx.createBiquadFilter();
        f.type = 'bandpass'; f.frequency.value = 1000; f.Q.value = 5;
        // Slowly sweep up
        f.frequency.setValueAtTime(1000, audioCtx.currentTime);
        f.frequency.linearRampToValueAtTime(8000, audioCtx.currentTime + 30);
        src.connect(f); f.connect(e); e.connect(musicGain);
        src.start();
        musicNodes.push({ stop: () => { e.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05); src.stop(audioCtx.currentTime + 0.1); }});
      }
      // Check periodically if we should start the riser
      function checkRiser() {
        if (!musicPlaying) return;
        if (L() >= 9 && !riserStarted) { riserStarted = true; startRiser(); }
        musicNodes.push(setTimeout(checkRiser, 500));
      }
      let riserStarted = false;

      // === Layer 10: Everything maxed — pad fully open, extra kick punch ===
      // Handled by existing layers reading L() >= 10

      // Start all clocks
      tickKick(); tickSub(); tickHat(); tickSquareBass(); updatePad();
      tickClap(); tickAcid(); tickRide(); tickLead(); checkRiser();
    }

    function stopMusic() {
      musicPlaying = false;
      musicNodes.forEach(n => {
        if (typeof n === 'number') clearTimeout(n);
        else if (n && n.stop) n.stop();
      });
      musicNodes = [];
    }

    // Sound toggle
    const soundToggle = document.getElementById('sound-toggle');
    if (!soundEnabled) soundToggle.classList.remove('on');
    soundToggle.addEventListener('click', () => {
      soundEnabled = !soundEnabled;
      soundToggle.classList.toggle('on', soundEnabled);
      localStorage.setItem('block_sound', soundEnabled ? 'on' : 'off');
      if (soundEnabled) {
        initAudio();
        if (gameRunning && launched) startMusic();
      } else {
        stopMusic();
      }
      updateAudioMute();
    });

    // Also exclude sound toggle from touch handler
    // (handled in the closest() check below)

    // Arena size (square)
    const ARENA = 420;
    canvas.width = ARENA;
    canvas.height = ARENA;

    // Player
    const PLAYER_SIZE = 30;
    let player = { x: ARENA / 2 - PLAYER_SIZE / 2, y: ARENA - PLAYER_SIZE - 10, size: PLAYER_SIZE };
    const playerSpeed = 5;

    // Bouncing squares (enemies)
    const ENEMY_SIZE = 26;
    let enemies = [];
    let launched = false; // has the game been launched?
    const TRAIL_LENGTH = 14;
    let playerTrail = []; // [{x, y}]
    let pendingSpawns = []; // { x, y, vx, vy, size, baseSpeed, spawnAt }

    function createFirstEnemy() {
      return {
        x: ARENA / 2 - ENEMY_SIZE / 2,
        y: ARENA / 2 - ENEMY_SIZE / 2,
        size: ENEMY_SIZE,
        vx: 0, vy: 0,
        baseSpeed: 3
      };
    }

    function spawnNewEnemy() {
      const SAFE_DIST = 80; // minimum distance from player center
      const speed = 2.5 + Math.random() * 1.5;
      let ex, ey, evx, evy;
      let tries = 0;

      do {
        // Pick a random edge
        const side = Math.floor(Math.random() * 4);
        if (side === 0) { // top
          ex = Math.random() * (ARENA - ENEMY_SIZE);
          ey = 0;
          evx = (Math.random() - 0.5) * speed;
          evy = Math.abs(speed * 0.8 + Math.random());
        } else if (side === 1) { // bottom
          ex = Math.random() * (ARENA - ENEMY_SIZE);
          ey = ARENA - ENEMY_SIZE;
          evx = (Math.random() - 0.5) * speed;
          evy = -(Math.abs(speed * 0.8 + Math.random()));
        } else if (side === 2) { // left
          ex = 0;
          ey = Math.random() * (ARENA - ENEMY_SIZE);
          evx = Math.abs(speed * 0.8 + Math.random());
          evy = (Math.random() - 0.5) * speed;
        } else { // right
          ex = ARENA - ENEMY_SIZE;
          ey = Math.random() * (ARENA - ENEMY_SIZE);
          evx = -(Math.abs(speed * 0.8 + Math.random()));
          evy = (Math.random() - 0.5) * speed;
        }
        tries++;
      } while (tries < 30 && Math.hypot(
        (ex + ENEMY_SIZE / 2) - (player.x + player.size / 2),
        (ey + ENEMY_SIZE / 2) - (player.y + player.size / 2)
      ) < SAFE_DIST);

      pendingSpawns.push({
        x: ex, y: ey, size: ENEMY_SIZE,
        vx: evx, vy: evy,
        baseSpeed: speed,
        spawnAt: Date.now() + 500
      });
    }

    // Diamond
    const DIAMOND_SIZE = 16;
    let diamond = { x: 0, y: 0, size: DIAMOND_SIZE, active: false };

    // Particles for collection effect
    let particles = [];

    // Game state
    let score = 0;
    let lastEnemyAtScore = 0; // track when we last spawned an enemy
    let gameRunning = false;
    let launchTime = 0;
    let invincibleUntil = 0; // timestamp when invincibility ends
    let keys = {};
    let animFrameId = null;

    // Death animation state
    let deathAnim = null; // { shards, startTime, duration, killerEnemy, speedMult }

    // Wall bounce effects
    let wallFlashes = []; // { side, alpha, pos (along wall) }
    let bounceParticles = []; // particles that fly outside the border
    // Per-side edge glow: each entry is { pos (0-1 along edge), alpha }
    const edgeGlows = { top: [], bottom: [], left: [], right: [] };
    const glowEls = {
      top: document.getElementById('glow-top'),
      bottom: document.getElementById('glow-bottom'),
      left: document.getElementById('glow-left'),
      right: document.getElementById('glow-right')
    };

    function spawnWallBounce(side, pos, speed) {
      sfxWallBounce(speed);
      // pos is in canvas coords; convert to 0-1 along that edge
      const norm = (side === 'top' || side === 'bottom') ? pos / ARENA : pos / ARENA;
      edgeGlows[side].push({ pos: norm, alpha: Math.min(1, 0.5 + speed * 0.1) });
      wallFlashes.push({ side, pos, alpha: Math.min(0.7, speed * 0.12) });
      // Spawn small red shards that fly outward past the border
      const count = 3 + Math.floor(Math.random() * 3);
      for (let i = 0; i < count; i++) {
        const sz = 2 + Math.random() * 4;
        let x, y, vx, vy;
        const spread = (Math.random() - 0.5) * 2;
        const outSpeed = 1 + Math.random() * 2;
        if (side === 'left') {
          x = 0; y = pos; vx = -outSpeed; vy = spread;
        } else if (side === 'right') {
          x = ARENA; y = pos; vx = outSpeed; vy = spread;
        } else if (side === 'top') {
          x = pos; y = 0; vx = spread; vy = -outSpeed;
        } else {
          x = pos; y = ARENA; vx = spread; vy = outSpeed;
        }
        bounceParticles.push({ x, y, vx, vy, size: sz, alpha: 0.9, rot: Math.random() * Math.PI });
      }
    }

    function updateWallEffects() {
      for (let i = wallFlashes.length - 1; i >= 0; i--) {
        wallFlashes[i].alpha -= 0.025;
        if (wallFlashes[i].alpha <= 0) wallFlashes.splice(i, 1);
      }
      for (let i = bounceParticles.length - 1; i >= 0; i--) {
        const p = bounceParticles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.alpha -= 0.03;
        p.rot += 0.1;
        if (p.alpha <= 0) bounceParticles.splice(i, 1);
      }
      // Update per-side edge glows
      for (const side of ['top', 'bottom', 'left', 'right']) {
        const hits = edgeGlows[side];
        for (let i = hits.length - 1; i >= 0; i--) {
          hits[i].alpha *= 0.88;
          if (hits[i].alpha < 0.01) hits.splice(i, 1);
        }
        const el = glowEls[side];
        if (!el) continue;
        if (hits.length === 0) {
          el.style.opacity = '0';
        } else {
          // Build a gradient with glow spots at each hit position
          const isHoriz = (side === 'top' || side === 'bottom');
          const stops = hits.map(h => {
            const pct = (h.pos * 100).toFixed(1);
            const a = h.alpha.toFixed(3);
            return `rgba(239,68,68,${a}) ${pct}%`;
          });
          // Add transparent stops between hits
          const grad = isHoriz
            ? `linear-gradient(to right, transparent 0%, ${stops.join(', transparent, ')}, transparent 100%)`
            : `linear-gradient(to bottom, transparent 0%, ${stops.join(', transparent, ')}, transparent 100%)`;
          el.style.background = grad;
          el.style.opacity = '1';
          // Box shadow outward for glow effect
          const maxAlpha = Math.max(...hits.map(h => h.alpha));
          const spread = Math.round(4 + maxAlpha * 12);
          if (side === 'top') el.style.boxShadow = `0 -${spread}px ${spread}px rgba(239,68,68,${(maxAlpha * 0.5).toFixed(2)})`;
          else if (side === 'bottom') el.style.boxShadow = `0 ${spread}px ${spread}px rgba(239,68,68,${(maxAlpha * 0.5).toFixed(2)})`;
          else if (side === 'left') el.style.boxShadow = `-${spread}px 0 ${spread}px rgba(239,68,68,${(maxAlpha * 0.5).toFixed(2)})`;
          else el.style.boxShadow = `${spread}px 0 ${spread}px rgba(239,68,68,${(maxAlpha * 0.5).toFixed(2)})`;
        }
      }
    }

    // Leaderboard (stored in localStorage)
    function getLeaderboard() {
      try {
        return JSON.parse(localStorage.getItem('block_leaderboard')) || [];
      } catch(e) { return []; }
    }
    function saveLeaderboard(lb) {
      localStorage.setItem('block_leaderboard', JSON.stringify(lb));
    }

    // Spawn diamond at random location (avoid all enemies and player)
    function spawnDiamond() {
      let tries = 0;
      let overlapping;
      do {
        diamond.x = DIAMOND_SIZE + Math.random() * (ARENA - DIAMOND_SIZE * 2);
        diamond.y = DIAMOND_SIZE + Math.random() * (ARENA - DIAMOND_SIZE * 2 - 60);
        tries++;
        overlapping = rectsOverlap(diamond.x - DIAMOND_SIZE/2, diamond.y - DIAMOND_SIZE/2, DIAMOND_SIZE, DIAMOND_SIZE,
                                   player.x, player.y, player.size, player.size);
        if (!overlapping) {
          for (const e of enemies) {
            if (rectsOverlap(diamond.x - DIAMOND_SIZE/2, diamond.y - DIAMOND_SIZE/2, DIAMOND_SIZE, DIAMOND_SIZE,
                             e.x, e.y, e.size, e.size)) {
              overlapping = true;
              break;
            }
          }
        }
      } while (tries < 50 && overlapping);
      diamond.active = true;
    }

    function rectsOverlap(x1, y1, w1, h1, x2, y2, w2, h2) {
      return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
    }

    // Particle burst on diamond collection
    function spawnParticles(x, y) {
      for (let i = 0; i < 8; i++) {
        const angle = (Math.PI * 2 / 8) * i;
        particles.push({
          x, y,
          vx: Math.cos(angle) * (2 + Math.random() * 2),
          vy: Math.sin(angle) * (2 + Math.random() * 2),
          life: 1,
          size: 3 + Math.random() * 3,
          color: Math.random() > 0.5 ? '#eab308' : '#fbbf24'
        });
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.03;
        p.size *= 0.97;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
      });
      ctx.globalAlpha = 1;
    }

    // Input
    window.addEventListener('keydown', e => {
      keys[e.key] = true;
      // Prevent page scroll with arrow keys
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) {
        e.preventDefault();
      }
    });
    window.addEventListener('keyup', e => { keys[e.key] = false; });

    // Zoom lens (separate off-canvas element)
    const lensEl = document.getElementById('zoom-lens');
    const lensCtx = lensEl.getContext('2d');
    const LENS_SIZE = 110;
    const LENS_ZOOM = 1; // 1:1 with game canvas
    let lensEnabled = localStorage.getItem('block_lens') !== 'off';
    const lensToggle = document.getElementById('lens-toggle');
    if (!lensEnabled) lensToggle.classList.remove('on');
    lensToggle.addEventListener('click', () => {
      lensEnabled = !lensEnabled;
      lensToggle.classList.toggle('on', lensEnabled);
      localStorage.setItem('block_lens', lensEnabled ? 'on' : 'off');
      if (!lensEnabled) lensEl.classList.remove('visible');
    });
    // Show toggle only on touch devices
    window.addEventListener('touchstart', function showToggle() {
      lensToggle.style.display = 'flex';
    }, { once: true });

    // Touch controls — move toward where you touch/hold
    let touchTarget = null; // {x, y} in canvas coordinates, or null
    let touchScreen = null; // {x, y} in screen coordinates for lens positioning

    function screenToCanvas(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = ARENA / rect.width;
      const scaleY = ARENA / rect.height;
      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
      };
    }

    function updateTouch(e) {
      const t = e.touches[0];
      touchTarget = screenToCanvas(t.clientX, t.clientY);
      touchScreen = { x: t.clientX, y: t.clientY };
    }

    window.addEventListener('touchstart', e => {
      if (e.target.closest('button, input, .board-panel, #lens-toggle, #sound-toggle')) return;
      e.preventDefault();
      updateTouch(e);
    }, { passive: false });

    window.addEventListener('touchmove', e => {
      if (e.target.closest('button, input, .board-panel, #lens-toggle, #sound-toggle')) return;
      e.preventDefault();
      updateTouch(e);
    }, { passive: false });

    window.addEventListener('touchend', e => {
      if (e.touches.length === 0) { touchTarget = null; touchScreen = null; }
    });
    window.addEventListener('touchcancel', () => { touchTarget = null; touchScreen = null; });

    // Start button
    document.getElementById('start-btn').addEventListener('click', () => {
      document.getElementById('start-panel').classList.remove('visible');
      startGame();
    });

    // Play again button
    document.getElementById('play-again-btn').addEventListener('click', () => {
      document.getElementById('game-over-panel').classList.remove('visible');
      startGame();
    });

    function startGame() {
      initAudio();
      stopMusic();
      score = 0;
      lastEnemyAtScore = 0;
      updateScoreDisplay();
      player.x = ARENA / 2 - PLAYER_SIZE / 2;
      player.y = ARENA - PLAYER_SIZE - 10;
      enemies = [createFirstEnemy()];
      launched = false;
      diamond.active = false;
      particles = [];
      wallFlashes = [];
      bounceParticles = [];
      playerTrail = [];
      for (const side in edgeGlows) edgeGlows[side] = [];
      pendingSpawns = [];
      gameRunning = true;
      launchTime = 0;
      touchTarget = null;
      touchScreen = null;
      if (animFrameId) cancelAnimationFrame(animFrameId);
      gameLoop();
    }

    function updateScoreDisplay() {
      document.getElementById('score').textContent = score;
    }

    function getSpeedMultiplier() {
      if (!launched || launchTime === 0) return 1;
      const elapsed = (Date.now() - launchTime) / 1000;
      // Speed increases by ~15% every 10 seconds
      return 1 + (elapsed * 0.015);
    }

    function update() {
      if (!gameRunning) return;

      // Player movement — keyboard
      if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
        player.x -= playerSpeed;
      }
      if (keys['ArrowRight'] || keys['d'] || keys['D']) {
        player.x += playerSpeed;
      }
      if (keys['ArrowUp'] || keys['w'] || keys['W']) {
        player.y -= playerSpeed;
      }
      if (keys['ArrowDown'] || keys['s'] || keys['S']) {
        player.y += playerSpeed;
      }

      // Player movement — touch (move toward touch point)
      if (touchTarget) {
        const pcx = player.x + player.size / 2;
        const pcy = player.y + player.size / 2;
        const dx = touchTarget.x - pcx;
        const dy = touchTarget.y - pcy;
        const dist = Math.hypot(dx, dy);
        if (dist > 3) { // dead zone so it doesn't jitter
          const move = Math.min(playerSpeed, dist);
          player.x += (dx / dist) * move;
          player.y += (dy / dist) * move;
        }
      }

      // Keep player in bounds
      player.x = Math.max(0, Math.min(ARENA - player.size, player.x));
      player.y = Math.max(0, Math.min(ARENA - player.size, player.y));

      // Record trails
      playerTrail.push({ x: player.x + player.size / 2, y: player.y + player.size / 2 });
      if (playerTrail.length > TRAIL_LENGTH) playerTrail.shift();
      for (const e of enemies) {
        if (!e.trail) e.trail = [];
        e.trail.push({ x: e.x + e.size / 2, y: e.y + e.size / 2 });
        if (e.trail.length > TRAIL_LENGTH) e.trail.shift();
      }

      // Before launch: check if player hits the first enemy to launch it
      if (!launched) {
        const firstEnemy = enemies[0];
        if (rectsOverlap(player.x, player.y, player.size, player.size,
                         firstEnemy.x, firstEnemy.y, firstEnemy.size, firstEnemy.size)) {
          // Launch the enemy in the direction the player hit it
          const dx = (firstEnemy.x + firstEnemy.size / 2) - (player.x + player.size / 2);
          const dy = (firstEnemy.y + firstEnemy.size / 2) - (player.y + player.size / 2);
          const dist = Math.hypot(dx, dy) || 1;
          firstEnemy.vx = (dx / dist) * firstEnemy.baseSpeed;
          firstEnemy.vy = (dy / dist) * firstEnemy.baseSpeed;
          launched = true;
          launchTime = Date.now();
          invincibleUntil = Date.now() + 1000; // 1 second of safety
          sfxLaunch();
          startMusic();
          spawnDiamond();
        }
        updateParticles();
        return;
      }

      // Promote pending spawns that are ready
      const now = Date.now();
      for (let i = pendingSpawns.length - 1; i >= 0; i--) {
        if (now >= pendingSpawns[i].spawnAt) {
          const s = pendingSpawns.splice(i, 1)[0];
          enemies.push({ x: s.x, y: s.y, size: s.size, vx: s.vx, vy: s.vy, baseSpeed: s.baseSpeed });
        }
      }

      // Move all enemies with speed multiplier
      const speedMult = getSpeedMultiplier();
      for (const e of enemies) {
        e.x += e.vx * speedMult;
        e.y += e.vy * speedMult;

        // Bounce off walls
        if (e.x <= 0) {
          e.x = 0;
          spawnWallBounce('left', e.y + e.size / 2, Math.abs(e.vx) * speedMult);
          e.vx = Math.abs(e.vx);
        }
        if (e.x + e.size >= ARENA) {
          e.x = ARENA - e.size;
          spawnWallBounce('right', e.y + e.size / 2, Math.abs(e.vx) * speedMult);
          e.vx = -Math.abs(e.vx);
        }
        if (e.y <= 0) {
          e.y = 0;
          spawnWallBounce('top', e.x + e.size / 2, Math.abs(e.vy) * speedMult);
          e.vy = Math.abs(e.vy);
        }
        if (e.y + e.size >= ARENA) {
          e.y = ARENA - e.size;
          spawnWallBounce('bottom', e.x + e.size / 2, Math.abs(e.vy) * speedMult);
          e.vy = -Math.abs(e.vy);
        }

        // Check collision with player (death) — skip if invincible
        if (Date.now() > invincibleUntil &&
            rectsOverlap(player.x + 2, player.y + 2, player.size - 4, player.size - 4,
                         e.x + 2, e.y + 2, e.size - 4, e.size - 4)) {
          startDeathAnim(e, speedMult);
          return;
        }
      }

      // Check diamond collection
      if (diamond.active) {
        const px = player.x + player.size / 2;
        const py = player.y + player.size / 2;
        const dist = Math.hypot(px - diamond.x, py - diamond.y);
        if (dist < (player.size / 2 + diamond.size / 2)) {
          score++;
          updateScoreDisplay();
          sfxDiamond();
          spawnParticles(diamond.x, diamond.y);
          diamond.active = false;

          // Spawn a new enemy every 5 diamonds
          if (score > 0 && score % 5 === 0 && score !== lastEnemyAtScore) {
            lastEnemyAtScore = score;
            spawnNewEnemy();
            sfxNewEnemy();
            musicLevelUp();
            // Flash warning particles at spawn location
            const newE = pendingSpawns[pendingSpawns.length - 1];
            const spawnX = newE.x + newE.size / 2;
            const spawnY = newE.y + newE.size / 2;
            for (let i = 0; i < 12; i++) {
              const angle = (Math.PI * 2 / 12) * i;
              particles.push({
                x: spawnX, y: spawnY,
                vx: Math.cos(angle) * 4,
                vy: Math.sin(angle) * 4,
                life: 1,
                size: 5,
                color: '#ef4444'
              });
            }
          }

          setTimeout(() => {
            if (gameRunning) spawnDiamond();
          }, 400);
        }
      }

      updateParticles();
      updateWallEffects();
    }

    function drawDiamond(x, y, size) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(Math.PI / 4);

      // Shadow
      ctx.shadowColor = 'rgba(234, 179, 8, 0.35)';
      ctx.shadowBlur = 10;

      // Main body
      ctx.fillStyle = '#eab308';
      ctx.fillRect(-size / 2, -size / 2, size, size);

      // Shine
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
      ctx.fillRect(-size / 2, -size / 2, size * 0.55, size * 0.55);

      // Subtle border
      ctx.strokeStyle = '#ca8a04';
      ctx.lineWidth = 1;
      ctx.strokeRect(-size / 2, -size / 2, size, size);

      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0, 0, ARENA, ARENA);

      // Arena background
      ctx.fillStyle = '#080c15';
      ctx.fillRect(0, 0, ARENA, ARENA);

      // Subtle grid
      ctx.strokeStyle = 'rgba(59,130,246,0.06)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= ARENA; i += 30) {
        ctx.beginPath();
        ctx.moveTo(i, 0); ctx.lineTo(i, ARENA);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i); ctx.lineTo(ARENA, i);
        ctx.stroke();
      }

      // Wall bounce glow effects
      for (const f of wallFlashes) {
        ctx.save();
        ctx.globalAlpha = f.alpha;
        let grad;
        const glowSize = 30;
        if (f.side === 'left') {
          grad = ctx.createLinearGradient(0, 0, glowSize, 0);
          grad.addColorStop(0, 'rgba(239,68,68,0.6)');
          grad.addColorStop(1, 'rgba(239,68,68,0)');
          ctx.fillStyle = grad;
          ctx.fillRect(0, f.pos - 40, glowSize, 80);
        } else if (f.side === 'right') {
          grad = ctx.createLinearGradient(ARENA, 0, ARENA - glowSize, 0);
          grad.addColorStop(0, 'rgba(239,68,68,0.6)');
          grad.addColorStop(1, 'rgba(239,68,68,0)');
          ctx.fillStyle = grad;
          ctx.fillRect(ARENA - glowSize, f.pos - 40, glowSize, 80);
        } else if (f.side === 'top') {
          grad = ctx.createLinearGradient(0, 0, 0, glowSize);
          grad.addColorStop(0, 'rgba(239,68,68,0.6)');
          grad.addColorStop(1, 'rgba(239,68,68,0)');
          ctx.fillStyle = grad;
          ctx.fillRect(f.pos - 40, 0, 80, glowSize);
        } else {
          grad = ctx.createLinearGradient(0, ARENA, 0, ARENA - glowSize);
          grad.addColorStop(0, 'rgba(239,68,68,0.6)');
          grad.addColorStop(1, 'rgba(239,68,68,0)');
          ctx.fillStyle = grad;
          ctx.fillRect(f.pos - 40, ARENA - glowSize, 80, glowSize);
        }
        ctx.restore();
      }

      // Bounce shards near walls
      for (const p of bounceParticles) {
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = '#ef4444';
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
        ctx.restore();
      }

      // Diamond
      if (diamond.active) {
        // Gentle bob animation
        const bobY = Math.sin(Date.now() / 300) * 2;
        drawDiamond(diamond.x, diamond.y + bobY, diamond.size);
      }

      // Particles
      drawParticles();

      // Trails (Tron-style) — full-width fading rectangles
      function drawTrail(trail, color, size) {
        if (trail.length < 2) return;
        const half = size / 2;
        for (let i = 0; i < trail.length; i++) {
          const alpha = (i / trail.length) * 0.1;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = color;
          ctx.fillRect(trail[i].x - half, trail[i].y - half, size, size);
        }
        ctx.globalAlpha = 1;
      }

      // Enemy trails
      for (const e of enemies) {
        if (e.trail && e.trail.length > 1) drawTrail(e.trail, '#ef4444', e.size);
      }
      // Player trail
      if (!deathAnim && playerTrail.length > 1) {
        drawTrail(playerTrail, '#3b82f6', player.size);
      }

      // Pending spawn previews (flashing ghost)
      for (const s of pendingSpawns) {
        const remaining = s.spawnAt - Date.now();
        const flash = Math.sin(Date.now() / 60) * 0.5 + 0.5; // fast pulse
        ctx.globalAlpha = 0.15 + flash * 0.25;
        ctx.strokeStyle = '#ef4444';
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 4]);
        ctx.strokeRect(s.x, s.y, s.size, s.size);
        ctx.setLineDash([]);
        ctx.globalAlpha = 1;
      }

      // All enemy squares
      for (const e of enemies) {
        ctx.shadowColor = 'rgba(239, 68, 68, 0.3)';
        ctx.shadowBlur = 8;
        ctx.fillStyle = '#ef4444';
        ctx.fillRect(e.x, e.y, e.size, e.size);
        ctx.shadowBlur = 0;
        // Bottom edge (3D)
        ctx.fillStyle = '#dc2626';
        ctx.fillRect(e.x, e.y + e.size - 4, e.size, 4);
        // Top highlight
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(e.x, e.y, e.size, 4);
      }

      // Player square (flashes when invincible, hidden during death)
      const isInvincible = Date.now() < invincibleUntil;
      const showPlayer = !deathAnim && (!isInvincible || Math.floor(Date.now() / 80) % 2 === 0);
      if (showPlayer) {
        if (isInvincible) {
          // Glowing shield effect during invincibility
          ctx.shadowColor = 'rgba(59, 130, 246, 0.6)';
          ctx.shadowBlur = 16;
        } else {
          ctx.shadowColor = 'rgba(59, 130, 246, 0.3)';
          ctx.shadowBlur = 8;
        }
        ctx.fillStyle = isInvincible ? '#60a5fa' : '#3b82f6';
        ctx.fillRect(player.x, player.y, player.size, player.size);
        ctx.shadowBlur = 0;
        // Bottom edge (3D)
        ctx.fillStyle = isInvincible ? '#3b82f6' : '#2563eb';
        ctx.fillRect(player.x, player.y + player.size - 4, player.size, 4);
        // Top highlight
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        ctx.fillRect(player.x, player.y, player.size, 4);
      }

      // Pre-launch hint
      if (!launched && gameRunning && enemies.length > 0) {
        const firstEnemy = enemies[0];
        ctx.fillStyle = 'rgba(59,130,246,0.6)';
        ctx.font = 'bold 14px system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.shadowBlur = 0;
        ctx.fillText('Hit the red square to launch it your way!', ARENA / 2, 28);

        // Pulsing arrow above enemy
        const pulse = Math.sin(Date.now() / 200) * 3;
        ctx.fillStyle = '#ef4444';
        ctx.beginPath();
        ctx.moveTo(firstEnemy.x + firstEnemy.size / 2, firstEnemy.y - 10 + pulse);
        ctx.lineTo(firstEnemy.x + firstEnemy.size / 2 - 7, firstEnemy.y - 20 + pulse);
        ctx.lineTo(firstEnemy.x + firstEnemy.size / 2 + 7, firstEnemy.y - 20 + pulse);
        ctx.fill();
      }

      // Zoom lens — positioned above finger, shows where you're heading
      if (lensEnabled && touchTarget && touchScreen && gameRunning) {
        // Position lens above the touch point
        let lensX = touchScreen.x - LENS_SIZE / 2;
        let lensY = touchScreen.y - LENS_SIZE - 30; // above finger
        // Keep on screen
        lensX = Math.max(4, Math.min(window.innerWidth - LENS_SIZE - 4, lensX));
        lensY = Math.max(4, lensY);
        lensEl.style.left = lensX + 'px';
        lensEl.style.top = lensY + 'px';
        lensEl.classList.add('visible');

        const half = LENS_SIZE / 2;
        const srcHalf = half / LENS_ZOOM;

        lensCtx.clearRect(0, 0, LENS_SIZE, LENS_SIZE);
        lensCtx.save();

        // Clip to circle
        lensCtx.beginPath();
        lensCtx.arc(half, half, half, 0, Math.PI * 2);
        lensCtx.clip();

        // Draw zoomed portion of game canvas centered on touch target
        lensCtx.drawImage(canvas,
          touchTarget.x - srcHalf, touchTarget.y - srcHalf, srcHalf * 2, srcHalf * 2,
          0, 0, LENS_SIZE, LENS_SIZE
        );

        // Crosshair dot
        lensCtx.beginPath();
        lensCtx.arc(half, half, 2.5, 0, Math.PI * 2);
        lensCtx.fillStyle = 'rgba(59, 130, 246, 0.6)';
        lensCtx.fill();

        lensCtx.restore();
      } else {
        lensEl.classList.remove('visible');
      }

      // Speed indicator + enemy count
      if (launched) {
        // Enemy count indicator (top right)
        if (enemies.length > 1) {
          ctx.font = 'bold 12px system-ui, sans-serif';
          ctx.textAlign = 'right';
          ctx.fillStyle = '#ef4444';
          ctx.fillText('Blocks: ' + enemies.length, ARENA - 8, ARENA - 8);
        }
        const mult = getSpeedMultiplier();
        const barCount = Math.min(Math.floor(mult * 2), 12);
        ctx.font = '10px system-ui, sans-serif';
        ctx.textAlign = 'left';
        ctx.fillStyle = 'rgba(59,130,246,0.35)';
        ctx.fillText('Speed', 8, ARENA - 8);
        for (let i = 0; i < barCount; i++) {
          const ratio = i / 12;
          if (ratio < 0.33) ctx.fillStyle = '#22c55e';
          else if (ratio < 0.66) ctx.fillStyle = '#eab308';
          else ctx.fillStyle = '#ef4444';
          ctx.fillRect(46 + i * 9, ARENA - 16, 6, 10);
        }
      }
    }

    function spawnShards(px, py, size) {
      const shards = [];
      const cols = 4, rows = 4;
      const sw = size / cols, sh = size / rows;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cx = px + c * sw + sw / 2;
          const cy = py + r * sh + sh / 2;
          const angle = Math.atan2(cy - (py + size / 2), cx - (px + size / 2)) + (Math.random() - 0.5) * 0.5;
          const speed = 1.5 + Math.random() * 2.5;
          shards.push({
            x: cx - sw / 2, y: cy - sh / 2,
            w: sw, h: sh,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            rot: 0,
            rotSpeed: (Math.random() - 0.5) * 0.3,
            alpha: 1
          });
        }
      }
      return shards;
    }

    function startDeathAnim(killerEnemy, speedMult) {
      stopMusic();
      sfxDeath();
      const shards = spawnShards(player.x, player.y, player.size);
      deathAnim = {
        shards,
        startTime: performance.now(),
        duration: 2000,
        killerEnemy,
        speedMult,
        flashAlpha: 1
      };
      gameRunning = false;
      deathAnimLoop();
    }

    function deathAnimLoop() {
      const elapsed = performance.now() - deathAnim.startTime;
      const t = Math.min(elapsed / deathAnim.duration, 1);

      // Slow-mo factor: starts at 0.15x, eases to near 0
      const slowMo = 0.15 * (1 - t * t);

      // Update enemies in slow motion
      for (const e of enemies) {
        e.x += e.vx * deathAnim.speedMult * slowMo;
        e.y += e.vy * deathAnim.speedMult * slowMo;
        if (e.x <= 0) { e.x = 0; e.vx = Math.abs(e.vx); }
        if (e.x + e.size >= ARENA) { e.x = ARENA - e.size; e.vx = -Math.abs(e.vx); }
        if (e.y <= 0) { e.y = 0; e.vy = Math.abs(e.vy); }
        if (e.y + e.size >= ARENA) { e.y = ARENA - e.size; e.vy = -Math.abs(e.vy); }
        if (!e.trail) e.trail = [];
        e.trail.push({ x: e.x + e.size / 2, y: e.y + e.size / 2 });
        if (e.trail.length > TRAIL_LENGTH) e.trail.shift();
      }

      // Update shards with wall bouncing
      for (const s of deathAnim.shards) {
        const speed = 0.3 + slowMo * 2;
        s.x += s.vx * speed;
        s.y += s.vy * speed;
        s.vy += 0.03; // tiny gravity
        s.rot += s.rotSpeed * speed;
        s.alpha = Math.max(0, 1 - t * 1.2);

        // Bounce off walls with energy loss
        const bounce = 0.6;
        if (s.x < 0) { s.x = 0; s.vx = Math.abs(s.vx) * bounce; s.rotSpeed *= -0.8; }
        if (s.x + s.w > ARENA) { s.x = ARENA - s.w; s.vx = -Math.abs(s.vx) * bounce; s.rotSpeed *= -0.8; }
        if (s.y < 0) { s.y = 0; s.vy = Math.abs(s.vy) * bounce; s.rotSpeed *= -0.8; }
        if (s.y + s.h > ARENA) { s.y = ARENA - s.h; s.vy = -Math.abs(s.vy) * bounce; s.rotSpeed *= -0.8; }
      }

      // Flash fades out
      deathAnim.flashAlpha = Math.max(0, 1 - elapsed / 150);

      // Draw scene
      draw();

      // Draw shards on top
      for (const s of deathAnim.shards) {
        ctx.save();
        ctx.globalAlpha = s.alpha;
        ctx.translate(s.x + s.w / 2, s.y + s.h / 2);
        ctx.rotate(s.rot);
        ctx.fillStyle = '#3b82f6';
        ctx.fillRect(-s.w / 2, -s.h / 2, s.w, s.h);
        ctx.fillStyle = '#2563eb';
        ctx.fillRect(-s.w / 2, s.h / 2 - 2, s.w, 2);
        ctx.restore();
      }

      // White flash overlay
      if (deathAnim.flashAlpha > 0) {
        ctx.globalAlpha = deathAnim.flashAlpha * 0.6;
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, ARENA, ARENA);
        ctx.globalAlpha = 1;
      }

      // Vignette / darken edges as time progresses
      if (t > 0.3) {
        const darkAlpha = (t - 0.3) * 0.6;
        ctx.fillStyle = `rgba(0,0,0,${darkAlpha})`;
        ctx.fillRect(0, 0, ARENA, ARENA);
      }

      if (t < 1) {
        animFrameId = requestAnimationFrame(deathAnimLoop);
      } else {
        deathAnim = null;
        gameOver();
      }
    }

    function gameLoop() {
      update();
      draw();
      if (gameRunning) {
        animFrameId = requestAnimationFrame(gameLoop);
      }
    }

    let pendingScore = 0;

    function gameOver() {
      gameRunning = false;
      pendingScore = score;

      // Calculate placement preview
      const lb = getLeaderboard();
      const tempLb = [...lb, { score: pendingScore }].sort((a, b) => b.score - a.score);
      const place = tempLb.findIndex(e => e.score === pendingScore) + 1;
      const ordinal = place === 1 ? '1st' : place === 2 ? '2nd' : place === 3 ? '3rd' : place + 'th';
      document.getElementById('name-placement').textContent = place <= 10 ? `You placed ${ordinal}!` : '';

      // Play placement sound
      if (place === 1) sfxVictory();
      else sfxDefeat();

      // Show name entry screen
      document.getElementById('name-score').textContent = score;
      const savedName = localStorage.getItem('block_player_name') || '';
      document.getElementById('name-input').value = savedName;
      document.getElementById('name-panel').classList.add('visible');
      setTimeout(() => document.getElementById('name-submit-btn').focus(), 100);
    }

    function submitName() {
      let playerName = document.getElementById('name-input').value.trim();
      if (!playerName) playerName = 'Player';
      localStorage.setItem('block_player_name', playerName);

      // Hide name entry
      document.getElementById('name-panel').classList.remove('visible');

      // Add to leaderboard
      let lb = getLeaderboard();
      lb.push({ name: playerName, score: pendingScore, isPlayer: true });
      lb.sort((a, b) => b.score - a.score);
      lb = lb.slice(0, 10);
      saveLeaderboard(lb);

      // Show leaderboard screen
      document.getElementById('final-name').textContent = playerName;
      document.getElementById('final-score').textContent = pendingScore;
      renderLeaderboard(lb, playerName, pendingScore);
      document.getElementById('game-over-panel').classList.add('visible');
      setTimeout(() => document.getElementById('play-again-btn').focus(), 100);
    }

    // Submit name on button click
    document.getElementById('name-submit-btn').addEventListener('click', submitName);

    // Global Enter key — triggers primary action of whichever modal is visible
    window.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      if (document.getElementById('start-panel').classList.contains('visible')) {
        document.getElementById('start-btn').click();
      } else if (document.getElementById('name-panel').classList.contains('visible')) {
        submitName();
      } else if (document.getElementById('game-over-panel').classList.contains('visible')) {
        document.getElementById('play-again-btn').click();
      }
    });

    const TROPHY_SVG = '<svg width="14" height="14" viewBox="0 0 16 16" style="vertical-align:-2px"><path d="M4 2h8v1h3v2c0 1.5-1 2.5-2.5 3-.3.8-.9 1.5-1.7 2L11 12H5l.2-2c-.8-.5-1.4-1.2-1.7-2C2 7.5 1 6.5 1 5V3h3V2z" fill="none" stroke="#3b82f6" stroke-width="1.2"/><rect x="5" y="12" width="6" height="1.5" rx="0.5" fill="none" stroke="#3b82f6" stroke-width="1"/></svg>';

    function renderLeaderboard(lb, currentName, currentScore) {
      const container = document.getElementById('lb-entries');
      container.innerHTML = '';
      let highlightedCurrent = false;
      lb.forEach((entry, i) => {
        const rank = i + 1;
        const div = document.createElement('div');

        const isCurrentEntry = entry.isPlayer && entry.name === currentName && entry.score === currentScore && !highlightedCurrent;
        if (isCurrentEntry) highlightedCurrent = true;

        div.className = 'lb-entry' + (isCurrentEntry ? ' you' : '');

        const rankStr = rank === 1 ? TROPHY_SVG : rank + '.';
        let nameStr = entry.name;
        if (isCurrentEntry) {
          nameStr = rank === 1 ? entry.name + ' ' + TROPHY_SVG : '<span style="color:rgba(59,130,246,0.5)">&rsaquo;</span> ' + entry.name;
        }

        div.innerHTML = `
          <span class="lb-rank">${rankStr}</span>
          <span class="lb-name">${nameStr}</span>
          <span class="lb-score">${entry.score}</span>
        `;
        container.appendChild(div);
      });
    }

    // Seed leaderboard if empty
    (function initLeaderboard() {
      let lb = getLeaderboard();
      if (lb.length === 0 || lb.every(e => e.isPlayer)) {
        const seeded = [
          { name: 'Alex', score: 15, isPlayer: false },
          { name: 'Sam', score: 10, isPlayer: false },
          { name: 'Jordan', score: 7, isPlayer: false },
          { name: 'Riley', score: 5, isPlayer: false },
          { name: 'Casey', score: 3, isPlayer: false },
        ];
        const playerEntries = lb.filter(e => e.isPlayer);
        lb = [...seeded, ...playerEntries].sort((a, b) => b.score - a.score).slice(0, 10);
        saveLeaderboard(lb);
      }
    })();

    // Initialize first enemy for initial draw
    enemies = [createFirstEnemy()];

    // Draw initial idle state
    draw();
  </script>
</body>
</html>
